# Go Crucible — Exercise Registry (MAINTAINER CONTENT — CONTAINS SPOILERS)
#
# This file is the canonical registry of all intentional bugs in the codebase.
# It ships publicly as of 2026-04-16. See .crucible/README.md for the
# rationale and the source-of-truth rules.
#
# Learners: please do not read this file until after you have attempted an
# exercise. The learning value is in the struggle.
#
# Each exercise entry documents:
#   - where the bug is (file, function, line region)
#   - what the bug is (mechanism)
#   - what the fix is (the change)
#   - what it teaches (the Go concept)
#   - patch file for the canonical solution
#   - solved_in_main: <date> if the fix is applied on main (learners who
#     want the buggy form run `git apply -R solutions/NN-*.patch`)

exercises:
  - number: "01"
    title: The Silent Failure
    app: kube-patrol
    difficulty: beginner
    file: internal/audit/pods.go
    function: AuditPodLimits
    mechanism: >
      When client.ListPods returns an error, the function logs it with
      slog.Error but does not return. It falls through and processes an
      empty pod list, returning (nil, nil). Callers cannot distinguish
      "no issues found" from "audit couldn't run."
    fix: >
      Add "return nil, err" inside the error-handling block after the
      slog.Error call.
    teaches:
      - Error swallowing (log-and-continue vs log-and-return)
      - The single handling rule — errors must be either logged OR returned
    patch: solutions/01-silent-failure.patch
    notes: >
      Source migrated from `log.Printf` to `slog.Error` on 2026-04-16 as
      part of the logger-unification sweep. The solution patch was stale
      ("no diff" stub) from the initial commit until 2026-04-16; see
      .crucible/notes/01-silent-failure.md for the full history.

  - number: "02"
    title: The Unwritten Labels
    app: kube-patrol
    difficulty: beginner
    file: internal/audit/deployments.go
    function: AuditDeploymentLabels
    mechanism: >
      The standalone function declares `var missingLabels map[string]bool`
      (nil map) instead of using make(). The DeploymentAuditor.Audit
      method works because the constructor initializes the map — but the
      direct function path panics on first write.
    fix: >
      Change `var missingLabels map[string]bool` to
      `missingLabels := make(map[string]bool)`.
    teaches:
      - Nil maps panic on write but not on read
      - Why constructors and direct-call paths can diverge
    patch: solutions/02-unwritten-labels.patch

  - number: "03"
    title: The Lost Alert
    app: pipeline
    difficulty: beginner
    file: internal/alert/evaluator.go
    function: AlertEvaluator.Evaluate
    mechanism: >
      Error is wrapped with fmt.Errorf("evaluation failed: %v", err) using
      %v instead of %w. This converts the error to a string, breaking the
      error chain. Callers using errors.Is(err, ErrThresholdExceeded) get
      false because the sentinel is no longer in the chain.
    fix: >
      Change %v to %w in the fmt.Errorf call.
    teaches:
      - Error wrapping with %w vs string conversion with %v
      - errors.Is requires an intact error chain
    patch: solutions/03-lost-alert.patch

  - number: "04"
    title: The Missing Workflow
    app: gh-forge
    difficulty: beginner
    file: internal/parser/workflow.go
    function: ParseWorkflow
    mechanism: >
      The intermediate rawWorkflow struct has unexported fields `on` and
      `env` (lowercase). The YAML decoder silently skips them. Exported
      fields like Name and Jobs parse correctly, making the failure
      non-obvious — only some fields are missing.
    fix: >
      Export the fields: change `on` to `On` and `env` to `Env`, adding
      appropriate yaml struct tags.
    teaches:
      - Go visibility rules affect YAML/JSON unmarshaling
      - Silent failure mode — no error, just zero values
    patch: solutions/04-missing-workflow.patch

  - number: "05"
    title: The Nil Check That Lies
    app: kube-patrol
    difficulty: intermediate
    file: internal/client/client.go
    function: NewAuditClient
    mechanism: >
      On error, returns (*KubeClient)(nil) as the AuditClient interface
      instead of returning nil, err. The caller's `if client != nil` check
      passes because the interface holds (type=*KubeClient, value=nil),
      which is non-nil. The next method call panics.
    fix: >
      Change `return (*KubeClient)(nil), nil` to `return nil, err` in
      both error paths.
    teaches:
      - Interface values are (type, value) pairs
      - Typed nil vs untyped nil
      - Always return untyped nil for interface error paths
    patch: solutions/05-nil-check-that-lies.patch
    notes: >
      Test uses a nonexistent kubeconfig path. Empty string would fall back
      to ~/.kube/config which may succeed on developer machines.

  - number: "06"
    title: The Stuck Pipeline
    app: pipeline
    difficulty: intermediate
    file: internal/ingest/reader.go
    function: ReadMetrics
    mechanism: >
      The goroutine reads from the source and sends to an unbuffered `out`
      channel. There is no `select` on ctx.Done(). When the context is
      cancelled and the consumer stops reading, the goroutine blocks
      forever on `out <- m`, leaking.
    fix: >
      Wrap the send in a select with a ctx.Done() case.
    teaches:
      - Goroutine lifecycle — every goroutine must have an exit path
      - Always include ctx.Done() in select when sending on channels
      - Unbuffered channels block when the other side stops
    patch: solutions/06-stuck-pipeline.patch

  - number: "07"
    title: The Phantom Matrix
    app: gh-forge
    difficulty: intermediate
    file: internal/parser/matrix.go
    function: ExpandMatrix
    mechanism: >
      The inner loop does `base := existing` which is a shallow copy of
      the map (reference copy). Then `base[dim] = v` mutates the shared
      map, corrupting all previously appended combinations that reference
      the same underlying map.
    fix: >
      Deep-copy the map before mutating: create a new map and copy all
      key-value pairs from existing before setting base[dim] = v.
    teaches:
      - Maps are reference types — assignment copies the reference
      - Shallow copy vs deep copy for composite types
    patch: solutions/07-phantom-matrix.patch

  - number: "08"
    title: The Zombie Metric
    app: pipeline
    difficulty: intermediate
    file: internal/transform/aggregate.go
    function: WindowedAggregator.Add
    mechanism: >
      The Add method writes to the internal map[string][]float64 without
      any synchronization. Multiple goroutines calling Add concurrently
      cause a data race. Without -race it may crash with "concurrent map
      writes"; with -race it is reliably detected.
    fix: >
      Add a sync.Mutex to the struct and Lock/Unlock around map access
      in both Add and Flush.
    teaches:
      - Maps are not safe for concurrent use
      - sync.Mutex for protecting shared state
      - The -race flag as a diagnostic tool
    patch: solutions/08-zombie-metric.patch
    notes: >
      Test requires -race flag. Without it, the test skips to avoid a
      fatal runtime abort that kills the test binary.

  - number: "09"
    title: The Immortal Connection
    app: kube-patrol
    difficulty: beginner
    file: internal/audit/secrets.go
    function: AuditSecretExpiry
    mechanism: >
      For each secret with an expiry annotation, the function opens an
      io.ReadCloser via newSecretReader but never calls Close(). The
      reader is used and then abandoned.
    fix: >
      Add `defer reader.Close()` immediately after opening the reader.
    teaches:
      - Resource management — always close what you open
      - The defer pattern for cleanup
      - Modeling real-world leaks (HTTP bodies, gRPC streams, DB cursors)
    patch: solutions/09-immortal-connection.patch

  - number: "10"
    title: The Hanging Health Check
    app: pipeline
    difficulty: intermediate
    file: internal/health/checker.go
    function: HealthChecker.Check
    mechanism: >
      The Check method calls each dependency check function with
      context.Background() instead of the caller's ctx. When the request
      context has a deadline or is cancelled, the health check ignores it
      and blocks until the dependency responds (or forever).
    fix: >
      Pass ctx instead of context.Background() to each dependency function.
    teaches:
      - Context propagation — pass the caller's context, not a fresh one
      - Why context.Background() in library code is almost always wrong
    patch: solutions/10-hanging-health-check.patch
    solved_in_main: 2026-04-16
    notes: >
      Fix applied on main 2026-04-16. The same audit also threaded ctx
      through the internal/client and internal/audit packages (previously
      they used context.Background() internally), so the lesson of this
      exercise now matches the shape of the surrounding codebase. Learners
      who want the buggy form back: `git apply -R solutions/10-*.patch`.

  - number: "11"
    title: The Template Trap
    app: gh-forge
    difficulty: intermediate
    file: internal/generate/template.go
    function: BuildAdvancedTemplate
    mechanism: >
      BuildAdvancedTemplate returns `adv.BaseTemplate` (the embedded field)
      as the Template interface, not `adv` itself. Since BaseTemplate also
      satisfies the Template interface, this compiles. At runtime,
      BaseTemplate.Generate() runs — which produces a plain workflow
      without matrix strategy or concurrency settings.
    fix: >
      Return `adv` (or `&adv`) instead of `adv.BaseTemplate`.
    teaches:
      - Struct embedding and method sets
      - Interface satisfaction with embedded types
      - Silent wrong-method-dispatch when both embedded and outer satisfy an interface
    patch: solutions/11-template-trap.patch

  - number: "12"
    title: The Race Report
    app: kube-patrol
    difficulty: intermediate
    file: internal/audit/report.go
    function: ConcurrentAudit
    mechanism: >
      Multiple goroutines append to a shared []Finding slice without a
      mutex. Slice append is not atomic — concurrent appends can lose
      data or corrupt the slice header.
    fix: >
      Add a sync.Mutex and lock around the findings append.
    teaches:
      - Slice append is not atomic
      - Data races on slices (different from concurrent map writes)
      - The -race flag catches this reliably
    patch: solutions/12-race-report.patch

  - number: "13"
    title: The Lost Goroutine
    app: kube-patrol
    difficulty: intermediate
    file: internal/audit/report.go
    function: ParallelAudit
    mechanism: >
      wg.Add(1) is called inside the goroutine body instead of before
      the go statement. If the scheduler runs wg.Wait() before any
      goroutine has called wg.Add(1), Wait returns immediately with a
      counter of zero, and goroutine results are lost.
    fix: >
      Move wg.Add(1) to before the `go func()` call.
    teaches:
      - sync.WaitGroup.Add must be called before the goroutine starts
      - Race between goroutine scheduling and Wait()
      - go vet detects this pattern
    patch: solutions/13-lost-goroutine.patch
    notes: >
      go vet flags this with "WaitGroup.Add called from inside new
      goroutine". This is the only expected go vet warning in the repo.

  - number: "14"
    title: The Forever Forwarder
    app: pipeline
    difficulty: advanced
    file: internal/ingest/reader.go
    function: ForwardMetrics
    mechanism: >
      The select reads from the input channel but does not handle the
      closed-channel case correctly. When the channel is closed, the
      receive returns (zero-value, false) but the code continues instead
      of returning. The function spins forever on a closed channel.
      Additionally, ctx.Done() is never checked.
    fix: >
      Check the `ok` boolean from the channel receive — return when
      !ok. Add a ctx.Done() case to the select.
    teaches:
      - Closed channels return zero value immediately
      - The comma-ok idiom for channel reads
      - Always handle channel closure in select loops
    patch: solutions/14-forever-forwarder.patch

  - number: "15"
    title: The Config Surprise
    app: gh-forge
    difficulty: advanced
    file: internal/parser/workflow.go
    function: RoundTripWorkflow
    mechanism: >
      The concurrencyIntermediate struct has CancelInProgress with
      `json:"cancel-in-progress,omitempty"`. When the value is false
      (a meaningful configuration), omitempty drops it during JSON
      serialization. After the YAML->JSON->YAML round-trip, the field
      is absent from the output.
    fix: >
      Remove `omitempty` from the CancelInProgress JSON tag, or use
      a *bool pointer type so that nil (absent) is distinguishable
      from false (explicitly set).
    teaches:
      - omitempty treats Go zero values as "empty" even when meaningful
      - The *bool pattern for distinguishing absent from false
      - Round-trip fidelity in serialization pipelines
    patch: solutions/15-config-surprise.patch

  - number: "16"
    title: The Leaking Linter
    app: gh-forge
    difficulty: advanced
    file: internal/lint/linter.go
    function: LintWorkflows
    mechanism: >
      Inside the for loop over directory entries, each file is opened with
      os.Open and `defer f.Close()` is called. Since defer is scoped to
      the enclosing function (not the loop), all file descriptors stay open
      until LintWorkflows returns. With hundreds of files, this exhausts
      the process's file descriptor limit.
    fix: >
      Extract the per-file logic into a separate function so defer runs
      per iteration, or close the file explicitly at the end of each
      iteration (without defer).
    teaches:
      - defer runs at function exit, not loop iteration
      - Resource accumulation in loops
      - The extract-to-function pattern for per-iteration cleanup
    patch: solutions/16-leaking-linter.patch

  - number: "17"
    title: The Metric Mirage
    app: pipeline
    difficulty: intermediate
    file: internal/transform/relabel.go
    function: MetricRelabeler.Relabel
    mechanism: >
      The loop `for key, m := range result` reads each Metric value into
      local variable m. The code modifies m.Labels, but m is a copy of
      the map value. The modified copy is never written back to
      result[key], so the changes are silently discarded.
    fix: >
      After modifying m.Labels, write the value back: `result[key] = m`.
    teaches:
      - Map values are copies — modifying a local variable doesn't
        modify the map entry
      - The read-modify-writeback pattern for map value structs
    patch: solutions/17-metric-mirage.patch

  - number: "18"
    title: The Ticking Leak
    app: pipeline
    difficulty: advanced
    file: internal/ingest/ticker.go
    function: TickerForwarder.Run
    mechanism: >
      The select loop uses `case <-time.After(interval)` which allocates
      a new timer on every iteration. Each timer lives until it fires,
      even after the next iteration has started. In a long-running daemon
      with a short interval, this causes unbounded timer/memory growth.
    fix: >
      Replace time.After with time.NewTicker (or time.NewTimer with
      Reset). Defer ticker.Stop() for cleanup.
    teaches:
      - time.After allocates per call — not suitable for loops
      - time.NewTicker/time.NewTimer for recurring timers
      - Memory profiling to detect allocation growth
    patch: solutions/18-ticking-leak.patch
    solved_in_main: 2026-04-16
    notes: >
      Fix applied on main 2026-04-16. Learners who want the buggy form back:
      `git apply -R solutions/18-*.patch`.

  - number: "19"
    title: The Graceless Shutdown
    app: pipeline
    difficulty: advanced
    file: cmd/pipeline/main.go
    function: RunPipeline + main
    mechanism: |
      Three independent bugs:
      1. signal.Notify is never called — sigCh is created but discarded
         with `_ = sigCh`. The daemon cannot be stopped via signals.
      2. doneCh is a package-level channel closed in a deferred func.
         Calling RunPipeline twice (e.g., in tests) panics on the second
         close of an already-closed channel.
      3. A background goroutine calls src.Read(context.Background())
         instead of src.Read(ctx). It ignores context cancellation and
         outlives the shutdown.
    fix: |
      1. Add `signal.Notify(sigCh, syscall.SIGINT, syscall.SIGTERM)`.
      2. Make doneCh local to RunPipeline, or use sync.Once to guard
         the close.
      3. Pass ctx to src.Read instead of context.Background().
    teaches:
      - Signal handling requires signal.Notify registration
      - Closing an already-closed channel panics
      - Every goroutine must honor the caller's context
      - Compound bugs in shutdown paths cause data loss
    patch: solutions/19-graceless-shutdown.patch
    solved_in_main: 2026-04-16
    notes: >
      Fix applied on main 2026-04-16. Canonical fix migrated from the old
      sigCh+signalNotify form to `signal.NotifyContext` (Go 1.16+), which
      makes bug 19-1 (signal.Notify never called) structurally
      inexpressible. The test dropped its `signal_notify_called` subtest
      accordingly; two subtests remain (double-close panic, goroutine-
      exits-on-cancel). See .crucible/notes/19-graceless-shutdown.md for
      the full modernization rationale. Learners who want the buggy form
      back: `git apply -R solutions/19-*.patch`.

  - number: "20"
    title: The Brittle Match
    app: pipeline
    difficulty: intermediate
    file: internal/ingest/dedup.go
    function: Deduplicator.Ingest
    mechanism: >
      Ingest recognises the "duplicate metric, treat as idempotent" case by
      testing whether the store's error message contains the substring
      "already recorded". Two CacheStore implementations in the test wrap
      the same sentinel (types.ErrDuplicate) with different surrounding
      messages; only the legacy store's wording contains the expected
      substring. Idempotency works for one store and silently fails for
      the other.
    fix: >
      Replace `strings.Contains(err.Error(), "already recorded")` with
      `errors.Is(err, types.ErrDuplicate)`. Both stores wrap the sentinel
      with %w, so errors.Is walks the chain correctly regardless of the
      surrounding message. Swap the `strings` import for `errors`.
    teaches:
      - Matching on err.Error() couples classification to a peer component's prose
      - errors.Is walks the chain and compares by identity — the wrapping
        layer's wording does not affect the result
      - Brittle string matches tend to pass happy-path tests and fail
        only when a driver, library, or reimplementation rewords the message
    patch: solutions/20-brittle-match.patch
    notes: >
      Companion to exercise 03: where 03 teaches that %v breaks the chain
      so errors.Is cannot find the sentinel, exercise 20 teaches that even
      when the chain is intact, inspecting the error *text* instead of the
      *chain* fails as soon as the wrapping layer rewords its message.
      Inspired by the `isUniqueViolation` helper in go-prod-change-registry
      (internal/store/sqlite/sqlite.go), which classifies SQLite driver
      errors by substring-matching "UNIQUE constraint failed" — a
      classification whose correctness depends on the driver never
      changing its wording.

  - number: "21"
    title: The Unbounded Request
    app: pipeline
    difficulty: intermediate
    file: internal/ingest/http.go
    function: PushHandler.ServeHTTP
    mechanism: >
      PushHandler.ServeHTTP decodes the HTTP request body with
      json.NewDecoder(r.Body).Decode(&req) — reading from an unbounded
      r.Body with no cap. The struct has a maxBytes field that the
      constructor plumbs through, but ServeHTTP never reads it. A client
      can post an arbitrarily large payload and exhaust server memory
      before the handler notices.
    fix: |
      Two additions before the decode:
        1. Wrap the body: r.Body = http.MaxBytesReader(w, r.Body, h.maxBytes).
           Assigning back to r.Body propagates the cap to any downstream
           reader (the JSON decoder, a streaming parser).
        2. In the decode-error path, classify the error with
           errors.As(err, &maxErr) where maxErr is *http.MaxBytesError.
           On match, respond 413 Request Entity Too Large; otherwise fall
           through to the existing 400 Bad Request response.
      Add `errors` to the import block.
    teaches:
      - net/http does not cap request-body size by default
      - http.MaxBytesReader wraps the body so reads past the limit return
        *http.MaxBytesError
      - "Classify decode errors: 413 for size-cap violations, 400 for
        malformed content — collapsing both hides signal from operators"
      - Defense in depth — the cap must be applied before the decoder
        allocates memory, not after
    patch: solutions/21-unbounded-request.patch
    notes: >
      The crucible's first HTTP-body-handling exercise. Companion pieces:
      exercise 09 teaches "close what you open" on HTTP bodies; exercise
      10 teaches context propagation inside handlers; exercise 21 teaches
      bounded input. Together they form the core of "what a Go HTTP
      handler must get right." Inspired by the go-prod-change-registry
      audit: the change-registry's own event-creation handlers decode
      JSON bodies without a MaxBytesReader cap, a realistic gap in
      LLM-generated service code.

  - number: "22"
    title: The Hollow Recovery
    app: pipeline
    difficulty: advanced
    file: internal/worker/pool.go
    function: Pool.processOne
    mechanism: >
      processOne defers `func() { p.recoverPanic(&r) }()` — an anonymous
      function that *calls* recoverPanic. recover() inside recoverPanic
      runs one frame deeper than the deferred function and returns nil
      per the Go spec ("recover was not called directly by a deferred
      function"). The panic from p.fn(m) is not consumed; it propagates
      up past processOne, past Process, and out to the caller. The
      recovery handler "runs" — logs nothing because recover returns
      nil — but does not actually recover.
    fix: >
      Change `defer func() { p.recoverPanic(&r) }()` to
      `defer p.recoverPanic(&r)`. Deferring recoverPanic directly puts
      recover() inside the deferred function where the spec requires
      it.
    teaches:
      - recover() must be called directly by a deferred function, not
        by a helper the deferred function calls
      - Extracting recovery into a helper for "cleanliness" silently
        breaks correctness if the extraction crosses the defer boundary
      - Hollow recovery (recovery code that exists but cannot fire) is
        worse than no recovery — the code reads as safe
      - No compile-time warning, no `go vet` flag, no symptom until a
        real panic exposes the gap
    patch: solutions/22-hollow-recovery.patch
    notes: >
      Inspired by John Doak's §15 (defer/panic/recover) from the 2018
      "Go Language Basics" deck. The deck's "only in package main"
      guidance is now outdated: modern Go services routinely recover at
      goroutine and handler boundaries (net/http's Server does it
      per-request, gRPC interceptors do it per-call). This exercise
      teaches the contemporary realistic bug shape — recovery is in the
      code, but mis-framed so it does nothing — rather than the older
      "recover wasn't used at all" failure mode.

# -----------------------------------------------------------------------------
# Review Track
#
# Review exercises train a different skill from the numbered exercises —
# reading change (a pull request) rather than reading isolated code. They
# do not have a planted bug in the crucible source tree; the diff lives
# inside the exercise's own README.md. There is no patch, no test, and
# no entry in `make status`. The deliverable is a code review, and the
# canonical sample review lives in the exercise directory as
# REVIEWER_NOTES.md.
#
# Schema differs from numbered exercises:
#   - number: "R01", "R02", ... — R-prefixed to keep namespaces distinct
#   - tier: basic | intermediate | advanced
#   - draws_on: list of numbered exercises whose reflexes the learner uses
#   - directory: path relative to repo root
#   - scenario: one-paragraph description of the simulated PR
#   - planted: list of entries, each with {kind, echoes?, summary}
#     kind ∈ {correctness, red-herring, process, question}
#     echoes is the numbered exercise this item's pattern is drawn from
#     (only set when kind == correctness)
#   - teaches: review-craft skills, not Go-language concepts
# -----------------------------------------------------------------------------

review_exercises:
  - number: "R01"
    title: First Review — The --since Flag PR
    tier: basic
    draws_on: ["01", "09"]
    directory: exercises/review/01-first-review/
    scenario: >
      Simulated PR against kube-patrol adding a --since flag to filter
      findings by recency, plus a state-file mechanism for "since last
      run" defaulting. The diff introduces two new helpers in
      internal/audit/since.go and renames AuditReport.FindingCount to
      NumFindings.
    planted:
      - kind: correctness
        echoes: "01"
        summary: >
          ParseSince logs an invalid-duration error with slog.Error
          but does not return it — caller receives time.Now() (d == 0
          on parse failure) and has no way to know the input was
          nonsense. Downstream FilterSince drops every finding.
      - kind: correctness
        echoes: "09"
        summary: >
          LoadLastRun calls os.Open on the state file and never closes
          the returned *os.File. Single invocation is benign; cron
          loops and long-running daemons leak one FD per call.
      - kind: red-herring
        summary: >
          AuditReport.FindingCount → NumFindings rename. Consistent
          within the diff (struct def + Summary method) and internal
          to the audit package. Reviewer should verify consistency
          and place in "Things I Verified," optionally with a tone
          call about splitting refactor from feature.
      - kind: process
        summary: >
          PR test plan lists "Unit tests for ParseSince and LoadLastRun —
          follow-up." Reviewer should push for tests in this PR, not
          a follow-up, given that a unit test for ParseSince would
          have caught bug 1.
    teaches:
      - Reading code change as a distinct skill from reading isolated code
      - Naming what you verified (false-positive discipline)
      - Separating correctness issues from process concerns
      - Proposing fixes alongside criticism when the fix is obvious
      - Severity calibration — major vs minor vs question vs nit
    notes: >
      First exercise in the review track. Planted bugs echo ex 01
      (log-and-continue) and ex 09 (missing defer Close) — both basic
      tier, both single-line fixes in isolation.

  - number: "R02"
    title: The Annotations Feature PR
    tier: basic
    draws_on: ["02", "04"]
    directory: exercises/review/02-annotations-feature/
    scenario: >
      Simulated PR against gh-forge adding a top-level annotations
      block to workflow YAML, giving each job an owner team and
      arbitrary string-valued tags. Also adds BuildOwnerIndex, a helper
      that inverts annotations into an owner→jobs lookup for
      alert-routing. The PR includes a unit test.
    planted:
      - kind: correctness
        echoes: "04"
        summary: >
          rawAnnotation.tags is unexported. The yaml:"tags" struct tag
          is decorative — Go's YAML decoder only populates exported
          fields via reflection. Every Annotations.Tags in the decoded
          result is silently nil.
      - kind: correctness
        echoes: "02"
        summary: >
          BuildOwnerIndex declares `var index map[string][]string` (nil
          map) and writes `index[ann.Owner] = ...` inside the loop.
          First write panics with "assignment to entry in nil map."
      - kind: red-herring
        summary: >
          Tags field is map[string]string rather than a richer Value
          union type. The PR description has an explicit Scope note
          deferring richer types to a follow-up. Reviewer should
          verify against the PR description and place in "Things I
          Verified."
      - kind: process
        summary: >
          The included unit test only exercises the happy path for
          Owner parsing. The fixture has no tags: block (so bug 1
          would pass even after half-fix), and BuildOwnerIndex is
          never called (so bug 2 never fires under test). Reviewer
          should demand test extensions in this PR — specifically for
          the tags field and for BuildOwnerIndex invocation.
      - kind: question
        summary: >
          Duplicate annotation names silently overwrite (map
          assignment is last-write-wins). Reviewer raises this as a
          question about intent, not a blocker — whichever behaviour
          the author chooses should be documented and tested.
    teaches:
      - Reading a test critically — "tests exist" is not "tests are sufficient"
      - Recognising yaml/json decoder visibility rules in a diff
      - Distinguishing a question ("what should duplicates do?") from a blocker
      - Re-reading the PR description before flagging — sometimes the
        author has already addressed a concern in prose
      - Calibrating severity — silent data loss is major even when fixable
    notes: >
      Second exercise in the review track. Planted bugs echo ex 04
      (unexported yaml field) and ex 02 (nil map panic) — both basic
      tier, both data-shape traps. Complements R01's control-flow +
      resource-lifecycle shape so learners exercise different reflex
      pathways across the two.

  - number: "R03"
    title: The Tagging Rules PR
    tier: basic
    draws_on: ["03", "04"]
    directory: exercises/review/03-tagging-rules/
    scenario: >
      Simulated PR against pipeline adding a metric-tagging-rules
      feature. Rules are loaded from YAML, each rule matches a metric
      name prefix, and matching metrics get tags added or overwritten.
      Exposes an ErrInvalidRule sentinel for downstream error
      classification.
    planted:
      - kind: correctness
        echoes: "04"
        summary: >
          rawRule.replace is unexported. Go's reflect-based YAML
          decoder silently skips it; every Rule.Replace in the
          returned slice is nil regardless of the YAML contents.
          The feature silently no-ops.
      - kind: correctness
        echoes: "03"
        summary: >
          The outer error wrap in LoadRules uses %v instead of %w on
          validateRule's error. validateRule itself wraps ErrInvalidRule
          with %w correctly, but the outer %v breaks the chain. Callers
          using errors.Is(err, ErrInvalidRule) get false.
      - kind: red-herring
        summary: >
          `var out []Rule` followed by `append` looks like R02's nil-map
          bug at first glance. It isn't — Go's `append` is defined to
          work on nil slices. Reviewer should verify, note in "Things
          I Verified," and not flag.
      - kind: red-herring
        summary: >
          The diff contains four fmt.Errorf sites, three correct and
          one buggy. A reviewer who sees "they used %w somewhere" and
          ticks the box misses the bug. Reviewer should check each
          fmt.Errorf site individually, name the correct ones in
          "Things I Verified," and flag only the one buggy site.
      - kind: process
        summary: >
          PR test plan argues "straightforward code" doesn't need unit
          tests and relies entirely on manual testing. The exact
          failure modes of both planted bugs are invisible to the
          manual test plan as written. Reviewer should push for at
          least two unit tests — one asserting Rule.Replace populated
          from YAML, one asserting errors.Is(err, ErrInvalidRule) on
          invalid input.
    teaches:
      - Checking every occurrence of a pattern, not just confirming
        the pattern is present somewhere
      - Distinguishing Go's nil-slice semantics from nil-map semantics
        (don't over-generalize a recently-learned trap)
      - Recognising that silent failures pass manual test plans
      - Pushing back on "this code is too simple to test" —
        simple-looking code with silent failure modes is where unit
        tests pay off most
    notes: >
      Third exercise in the review track. Planted bugs echo ex 03 (%v
      vs %w) and ex 04 (unexported yaml field) — both basic tier,
      both silent failures. R03's distinctive shape is that NEITHER
      planted bug produces a visible runtime symptom; both require
      pure static reading to catch. Completes the basic-tier coverage
      — across R01+R02+R03, every basic-tier pattern is exercised at
      least once.

  - number: "R04"
    title: The Remote Write PR
    tier: intermediate
    draws_on: ["05", "10"]
    directory: exercises/review/04-remote-write/
    scenario: >
      Simulated PR against pipeline adding best-effort remote-write
      forwarding: RemoteSink (an ingest.MetricSink implementation that
      POSTs each metric to a central collector), an optional
      -remote-url flag in cmd/pipeline, and a forwarding goroutine in
      RunPipeline. Degraded mode — run local-only when the URL is
      absent or invalid — is an explicit, stated design goal of the
      PR.
    planted:
      - kind: correctness
        echoes: "05"
        summary: >
          Both error paths in NewRemoteSink return (*RemoteSink)(nil)
          as the MetricSink interface. main.go's degraded-mode check
          `if sink != nil` passes because the interface holds
          (type=*RemoteSink, value=nil); the daemon logs both "remote
          write disabled" AND "remote write enabled", then panics on
          the first Publish with a nil receiver. A config typo
          becomes a crash loop — the opposite of the PR's degraded-
          mode goal.
      - kind: correctness
        echoes: "10"
        summary: >
          Publish builds its request with
          http.NewRequestWithContext(context.Background(), ...)
          instead of the caller's ctx. Shutdown and per-request
          deadlines never reach the HTTP layer; the only remaining
          bound is the client's flat 5s timeout.
      - kind: red-herring
        summary: >
          Publish drains the response body with io.Copy(io.Discard,
          resp.Body) before the deferred Close. Looks like dead code;
          it is the keep-alive connection-reuse idiom. Verify, place
          in "Things I Verified", do not flag.
      - kind: process
        summary: >
          The included unit test uses a valid httptest URL and a
          Background context — the one configuration where neither
          bug can fire. Reviewer should ask for an invalid-URL
          constructor test asserting `sink == nil` (the assertion
          that distinguishes untyped from typed nil) and a
          cancelled-context Publish test against a blocking handler.
      - kind: question
        summary: >
          Non-2xx handling treats 401 and 503 identically (log and
          drop). Permanent-vs-transient classification raised as a
          question about intent, not a blocker.
    teaches:
      - Tracing a constructor's return value across files into the
        nil check that consumes it
      - Typed-nil interface returns as a reviewable pattern, not just
        a runtime surprise
      - Context propagation through new I/O paths
      - Recognising the body-drain idiom instead of over-flagging it
      - Connecting a bug to the PR's own stated requirements
    notes: >
      First intermediate-tier review exercise. Pairs ex 05 + ex 10
      per the backlog plan. Distinctive shape: neither bug is visible
      inside a single hunk — both require simulating runtime
      behaviour, one across two files. The typed-nil symptom
      (contradictory log lines, then a panic) directly contradicts
      the PR's degraded-mode design goal.

  - number: "R05"
    title: The Alert Summaries PR
    tier: intermediate
    draws_on: ["06", "17"]
    directory: exercises/review/05-alert-summaries/
    scenario: >
      Simulated PR against pipeline adding per-team alert summaries:
      Aggregate groups firing alerts by team label into a
      map[string]Summary (count, capped example names, Truncated
      counter for "and N more" rendering); Stream delivers summaries
      to a channel in sorted order from its own goroutine for the
      notifier to consume.
    planted:
      - kind: correctness
        echoes: "17"
        summary: >
          markTruncated ranges over map values (`for _, s := range`),
          sets s.Truncated on the local copy, and never writes the
          copy back. Every summary's Truncated stays zero; the
          "and N more" feature — the PR's stated purpose for the
          field — silently never activates.
      - kind: correctness
        echoes: "06"
        summary: >
          Stream's goroutine sends with a bare `out <- summaries[t]`
          and no ctx.Done() case, even though its own doc comment
          promises "Cancel ctx to abandon delivery" (ctx is only used
          in a debug log line). A consumer that stops reading leaks
          the goroutine forever — one per evaluation cycle in a
          daemon — and the deferred close(out) never runs.
      - kind: red-herring
        summary: >
          Aggregate's accumulation loop also mutates values obtained
          from a map range — but the map is map[string]*Summary, and
          mutating through a pointer value works fine. A learner
          fresh off ex 17 may over-flag. The later out[team] = *s
          conversion to value copies is deliberate defensive copying.
      - kind: process
        summary: >
          The included test's fixture has two firing alerts on one
          team — below the three-example cap, so Truncated is
          legitimately zero and the write-back bug is structurally
          undetectable. Stream has no test at all. Reviewer should
          ask for a 4+-alert fixture asserting Truncated, and a
          Stream cancellation test (read one, cancel, assert close).
      - kind: question
        summary: >
          Alerts without a team label aggregate under the empty
          string. Is "" routed anywhere downstream, or do unowned
          firing alerts vanish from notifications? Question about
          intent — either answer should be documented and tested.
    teaches:
      - Map-value copy semantics inside a diff — plus the pointer-map
        counterexample, so the rule is learned precisely
      - Doc comments are claims to verify against the implementation
      - Goroutine-lifecycle review — every send needs an exit path
        the diff must show
      - Reading a test's blind spots from its fixture sizes
    notes: >
      Second intermediate-tier review exercise. Pairs ex 06 + ex 17
      per the backlog plan. The red herring deliberately inverts
      ex 17 (pointer-valued maps mutate fine) so learners cannot
      pattern-match "mutation in a range loop = bug" — they must
      check the value type.

  - number: "R06"
    title: The Org Defaults PR
    tier: intermediate
    draws_on: ["07", "11"]
    directory: exercises/review/06-org-defaults/
    scenario: >
      Simulated PR against gh-forge adding organisation-wide workflow
      defaults: OrgTemplate embeds BaseTemplate and layers shared env
      vars (plus a per-repo REPO entry) and a baseline permissions
      block onto the generated workflow; BuildOrgTemplate returns it
      as the Template interface; GenerateAll produces one workflow
      per repository from one shared OrgDefaults value.
    planted:
      - kind: correctness
        echoes: "11"
        summary: >
          BuildOrgTemplate returns t.BaseTemplate instead of t. The
          embedded type also satisfies Template, so it compiles, and
          BaseTemplate.Generate runs — producing valid-looking
          workflows with no org env, no permissions, no REPO entry.
          Silent policy omission: the worst failure shape for a
          security-rollout feature.
      - kind: correctness
        echoes: "07"
        summary: >
          OrgTemplate.Generate does `env := o.Defaults.Env`
          (reference copy) then `env["REPO"] = o.Repo`, writing into
          the shared defaults map. Across GenerateAll every workflow
          aliases that one map, so all report the last repo's REPO
          value, and the caller's OrgDefaults is mutated as a side
          effect. Latent nil-map write panic when Defaults.Env is
          nil; a proper per-workflow copy fixes all three at once.
      - kind: red-herring
        summary: >
          o.BaseTemplate.Generate() inside OrgTemplate.Generate has
          the same x.BaseTemplate expression shape as the bug — but
          it is the correct extend-the-base pattern: invoke the
          embedded type's method, then layer on top of the result.
          The expression is not the bug; the value crossing the
          interface boundary is.
      - kind: red-herring
        summary: >
          wf.Permissions = o.Defaults.Permissions aliases the shared
          map exactly like the Env site — but nothing in the diff
          writes through it, so it corrupts nothing today. Belongs in
          Suggestions (defensive copy) with explicitly lower severity
          than the Env site. Severity calibration on identical
          patterns is the lesson.
      - kind: process
        summary: >
          The included test calls GenerateAll with a single repo —
          the one fixture size at which shared-map corruption cannot
          manifest — and never invokes BuildOrgTemplate at all, so
          the wrong-return bug never executes under test. Reviewer
          should ask for a two-repo test asserting distinct REPO
          values (plus no "REPO" key left in defaults.Env afterwards)
          and a BuildOrgTemplate test asserting org defaults present.
      - kind: question
        summary: >
          Env-key precedence is undecided: when a repo or template
          later defines a key that collides with an org default,
          which wins? Nothing in the diff decides; raise as a
          question to document and test, not a blocker.
    teaches:
      - Telling twins apart — the same expression shape appearing
        once correctly and once as a bug in one diff
      - Severity calibration — two identical aliasing sites with
        different consequences because only one is written through
      - Fixture-size blindness — a one-element test cannot express
        cross-element corruption
      - Method-set reasoning when embedded and outer types both
        satisfy an interface
    notes: >
      Third intermediate-tier review exercise. Pairs ex 07 + ex 11
      per the backlog plan. Built deliberately from near-twins (two
      x.BaseTemplate expressions, two map aliases) so the learner
      must articulate the distinction rather than pattern-match.
      Completes the planned intermediate coverage: across R04–R06,
      exercises 05/06/07/10/11/17 are each echoed exactly once.

# -----------------------------------------------------------------------------
# Diagnosis Track
#
# Diagnosis exercises train artifact-first debugging: the learner reads
# a captured diagnostic artifact (goroutine profile, race detector
# report, panic traceback) and must localize the bug to file:line and
# write a diagnosis BEFORE opening the source. Each exercise reuses a
# numbered exercise's planted bug as ground truth; fixing it and
# running the numbered exercise's test is the verification step.
#
# MAINTENANCE WARNING: artifacts embed real file:line references into
# this repository (the `references` field lists which files). When a
# refactor shifts lines in a referenced file, update the artifact in
# the same commit — see rule 4 in .crucible/README.md.
#
# Schema:
#   - number: "D01", "D02", ... — D-prefixed namespace
#   - tier: basic | intermediate | advanced
#   - artifact_kind: goroutine-profile | race-report | panic-traceback | ...
#   - localizes: the numbered exercise whose planted bug the artifact captures
#   - artifact: path to the ARTIFACT.txt
#   - references: files the artifact embeds line numbers for, each with
#     machine-checkable pins ({line, contains}) verified by tools/verify
#     (make verify-quick) — when a referenced file shifts, update the
#     artifact and its pins together in the same commit
#   - directory, scenario, teaches, notes: as elsewhere
# -----------------------------------------------------------------------------

diagnosis_exercises:
  - number: "D01"
    title: The Pile-Up
    tier: intermediate
    artifact_kind: goroutine-profile
    localizes: "06"
    artifact: exercises/diagnosis/01-goroutine-pileup/ARTIFACT.txt
    references:
      - file: internal/ingest/reader.go
        pins:
          - { line: 12, contains: "go func()" }
          - { line: 18, contains: "out <- m" }
    directory: exercises/diagnosis/01-goroutine-pileup/
    scenario: >
      An in-universe metrics-scheduler service embeds the ingest
      package, one reader per scrape target, cancelling the target's
      context on removal. After a week of target churn the goroutine
      count is ~3,900 and monotonically climbing. The artifact is a
      pprof goroutine profile in both debug=1 (aggregated buckets
      with counts) and debug=2 (per-goroutine state and wait
      duration) form: 3,848 goroutines share one stack, parked in
      [chan send] at reader.go:18 with wait durations spread over
      the whole migration week, created at reader.go:12.
    teaches:
      - Reading debug=1 (what is most of the process doing) before
        debug=2 (how long, in what state)
      - The leak signature — many goroutines, one stack — and using
        wait-duration spread to distinguish leak from burst
      - Walking created-by frames from a parked goroutine to the
        code that started it
      - Triaging frames you own from runtime/embedder frames
    notes: >
      First diagnosis exercise. Gentlest of the three: the leaked
      stack is one frame deep and both of its lines point straight
      at the bug. The scenario's "we cancel every context" claim
      teaches that delivery of cancellation is not the same as
      listening for it.

  - number: "D02"
    title: Two Stacks, One Line
    tier: intermediate
    artifact_kind: race-report
    localizes: "12"
    artifact: exercises/diagnosis/02-two-stacks/ARTIFACT.txt
    references:
      - file: internal/audit/report.go
        pins:
          - { line: 44, contains: "go func(fn AuditFunc)" }
          - { line: 55, contains: "findings = append(findings, result...)" }
      - file: internal/audit/report_test.go
        pins:
          - { line: 75, contains: "audit.ConcurrentAudit" }
          - { line: 81, contains: "t.Errorf" }
    directory: exercises/diagnosis/02-two-stacks/
    scenario: >
      Nightly -race CI has been failing intermittently for a month
      and the team has been re-running it ("it's flaky").  The
      artifact is the failing job's output: a WARNING DATA RACE block
      whose two access stacks both point at report.go:55
      (ConcurrentAudit.func1), both created at report.go:44, plus the
      test's failing count assertion (got 35, want 50) and a CI
      annotation listing failing counts 35/40/45 across runs — whole
      5-finding batches lost.
    teaches:
      - Race report anatomy — two access stacks, the shared address,
        and the created-at stacks, read as a sentence
      - Same line in both stacks = a function racing its own
        instances; find the fan-out
      - Varying wrong counts as a concurrency fingerprint; whole-batch
        loss as the slice-header-append signature
      - '"-race failures are never flaky tests" — the detector has no
        false positives'
    notes: >
      Second diagnosis exercise. The artifact deliberately includes
      the month-of-re-runs framing so the canonical notes can model
      reframing "flaky" as "racy". DIAGNOSIS_NOTES points at the
      ConcurrentAudit/ParallelAudit irony (errMu correctly guards the
      error two lines above the unguarded append; the sibling locks
      its append but has ex 13's bug).

  - number: "D03"
    title: The Crash That Couldn't Happen
    tier: advanced
    artifact_kind: panic-traceback
    localizes: "22"
    artifact: exercises/diagnosis/03-impossible-crash/ARTIFACT.txt
    references:
      - file: internal/worker/pool.go
        pins:
          - { line: 59, contains: "p.processOne(m)" }
          - { line: 72, contains: "p.fn(m)" }
    directory: exercises/diagnosis/03-impossible-crash/
    scenario: >
      An in-universe one-off batch tool (reprocess) replays archived
      samples through worker.Pool, whose docs promise per-invocation
      panic recovery. The artifact is the job's stderr: normal slog
      progress lines, then a panic traceback travelling from the
      processor closure through pool.go:72 and pool.go:59 to the top
      of main — plus the reporting engineer's notes: the docs quote,
      a zero-hit historical grep for "processor panicked", and
      confirmation that a real logger is attached.
    teaches:
      - Traceback frame line numbers are call sites — the hand-off
        line in every function on the path
      - Deferred functions that ran leave no frames; failed recovery
        is diagnosed from absence (the log line it should have
        produced)
      - Differential diagnosis — write the ranked hypothesis list
        with kill-conditions BEFORE reading the source
      - The spec's recover()-must-be-called-directly rule as the one
        structural explanation that fits "never worked, ever"
    notes: >
      Third diagnosis exercise and deliberately the hardest shape:
      the artifact alone cannot name the line — it proves a
      contradiction (documented recovery, traceback indistinguishable
      from no recovery) and the learner must rank hypotheses and
      eliminate them against pool.go. The DIAGNOSIS_TEMPLATE differs
      from D01/D02 accordingly (proves/absences/hypotheses sections).
      Unlike D01/D02 the embedded artifact line numbers (72, 59) are
      call sites inside frames, not the buggy lines themselves — the
      bug (the defer wrapper at pool.go:69-71) is one screen away.
